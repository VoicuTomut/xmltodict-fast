name: Tests

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Create virtualenv (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m venv .venv
          echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      - name: Create virtualenv (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m venv .venv
          echo "${{ github.workspace }}\.venv\Scripts" >> $env:GITHUB_PATH

      - name: Install maturin and test deps
        run: pip install maturin pytest

      - name: Build and install (with Rust extension)
        run: maturin develop --release

      - name: Run tests
        run: python -m pytest tests/ -q

  test-pure-python:
    name: Pure Python fallback (PyPy ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["pypy3.10", "pypy3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test deps
        run: pip install pytest

      - name: Run tests (pure Python via PYTHONPATH)
        run: python -m pytest tests/ -q
        env:
          PYTHONPATH: ${{ github.workspace }}/python
